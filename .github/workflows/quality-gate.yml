name: quality-gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_types:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Perf budget guardrail
        run: npm run perf:budget

      - name: Typecheck
        run: npx tsc --noEmit

  smoke_public:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run public smoke
        run: npm run test:smoke:public

      - name: Upload smoke public artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-public-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  smoke_workspace:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run workspace smoke
        run: npm run test:smoke:workspace

      - name: Upload smoke workspace artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-workspace-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
